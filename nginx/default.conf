server {
    listen 80;
    server_name irodori-no-wa.duckdns.org;

    # Let's Encrypt の認証用（スタンプラリーの場所）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 全てのリクエストを強制的に HTTPS へ転送
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name irodori-no-wa.duckdns.org;

    # 証明書の場所（Certbotが生成するパス）
    ssl_certificate /etc/letsencrypt/live/irodori-no-wa.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/irodori-no-wa.duckdns.org/privkey.pem;

    # SSLの推奨設定（セキュリティ強化）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # フロントエンド（Reactなど）への転送
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # バックエンド（Django API）への転送
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django 管理画面
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 静的ファイル（画像など）
    location /media/ {
        proxy_pass http://backend:8000;
    }
}
